<defs>
  <style>
    .dash-flow {
      animation: dash-march 1.4s linear infinite;
    }
    .dash-flow-slow {
      animation: dash-march 1.8s linear infinite;
    }
    .dash-flow-fast {
      animation: dash-march 1s linear infinite;
    }
    @keyframes dash-march {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -24; }
    }

    .node-pulse {
      animation: node-glow 1.4s ease-in-out infinite;
    }
    @keyframes node-glow {
      0%, 100% { r: 1.5; opacity: 1; }
      50%       { r: 3;   opacity: 0.5; }
    }
  </style>

